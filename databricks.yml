# This is a Databricks asset bundle definition for agent_monitoring.
# See https://docs.databricks.com/dev-tools/bundles/index.html for documentation.
bundle:
  name: agent_monitoring
  uuid: f88c28ce-2c65-4caa-afaf-0402da64758e

include:
  - resources/*.yml

# Variable declarations. These variables are assigned in the dev/prod targets below.
variables:
  catalog:
    description: The catalog to use
  schema:
    description: The schema to use
  simulate_failure:
    description: Set to "true" to trigger a deliberate failure in silver_transform
    default: "false"

targets:
  dev:
    # The default target uses 'mode: development' to create a development copy.
    # - Deployed resources get prefixed with '[dev my_user_name]'
    # - Any job schedules and triggers are paused by default.
    # See also https://docs.databricks.com/dev-tools/bundles/deployment-modes.html.
    mode: development
    default: true
    workspace:
      host: https://dbc-b0ffb3bc-1260.cloud.databricks.com
    variables:
      catalog: agent_monitoring
      schema: ${workspace.current_user.short_name}
    presets:
      artifacts_dynamic_version: true
  prod:
    mode: production
    workspace:
      host: https://dbc-b0ffb3bc-1260.cloud.databricks.com
      # We explicitly deploy to /Workspace/Users/murugaveltarun@gmail.com to make sure we only have a single copy.
      root_path: /Workspace/Users/murugaveltarun@gmail.com/.bundle/${bundle.name}/${bundle.target}
    variables:
      catalog: agent_monitoring
      schema: prod
    permissions:
      - user_name: murugaveltarun@gmail.com
        level: CAN_MANAGE
